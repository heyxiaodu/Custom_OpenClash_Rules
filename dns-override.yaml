# OpenClash DNS 防泄漏覆写配置
# 作者：基于 Aethersailor/Custom_OpenClash_Rules 项目
# 使用方法：在 OpenClash LuCI 界面 → 覆写设置 → DNS设置 中粘贴以下内容

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:7874
  fake-ip-filter-mode: blacklist
  # 国外域名：通过 DoH/DoT 加密查询，走代理隧道，ISP 完全不可见
  nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - tls://1.1.1.1:853
  # 国内域名：通过 DoH 直连国内 DNS（加密，不走代理，速度快）
  # 已移除明文 DNS，防止 ISP 透明 DNS 拦截导致泄露
  fallback:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - https://dns.cloudflare.com/dns-query
    - tls://dot.quad9.net:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.example"
    - "*.invalid"
    - "*.localhost"
    - "*.test"
    - "*.local"
    - "*.home.arpa"
    - "*.direct"
    - cable.auth.com
    - network-test.debian.org
    - detectportal.firefox.com
    - resolver1.opendns.com
    - global.turn.twilio.com
    - global.stun.twilio.com
    - app.yinxiang.com
    - injections.adguard.org
    - localhost.*.weixin.qq.com
    - "*.blzstatic.cn"
    - "*.cmpassport.com"
    - id6.me
    - open.e.189.cn
    - opencloud.wostore.cn
    - id.mail.wo.cn
    - mdn.open.wo.cn
    - hmrz.wo.cn
    - nishub1.10010.com
    - enrichgw.10010.com
    - "*.wosms.cn"
    - "*.jegotrip.com.cn"
    - "*.icitymobile.mobi"
    - "*.pingan.com.cn"
    - "*.cmbchina.com"
    - "*.10099.com.cn"
    - "*.microdone.cn"
    - PDC._msDCS.*.*
    - DC._msDCS.*.*
